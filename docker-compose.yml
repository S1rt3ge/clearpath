services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clearpath
      POSTGRES_USER: clearpath_user
      POSTGRES_PASSWORD: clearpath_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearpath_user -d clearpath"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://clearpath_user:clearpath_pass@postgres:5432/clearpath
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GOOGLE_AI_STUDIO_API_KEY: ${GOOGLE_AI_STUDIO_API_KEY:-}
      GEMMA_LOCAL_MODEL: ${GEMMA_LOCAL_MODEL:-gemma4:e2b-it-q4_K_M}
      GEMMA_CLOUD_MODEL: ${GEMMA_CLOUD_MODEL:-gemini-2.0-flash}
      CACHE_TTL_MINUTES: ${CACHE_TTL_MINUTES:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional pgAdmin for database debugging.
  # Start with: docker-compose --profile debug up -d
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["debug"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
